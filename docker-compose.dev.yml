services:
  postgres:
    image: postgres:16-alpine
    container_name: crmp_postgres
    restart: unless-stopped
    env_file: .env.docker
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      retries: 5
      timeout: 5s
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: crmp_migrate
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: crmp_backend
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      migrate:
        condition: service_completed_successfully

  redis:
    image: redis:alpine
    container_name: crmp_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/crmp-public;
      mc mb -p local/crmp-private;
      mc anonymous set download local/crmp-public;

      echo 'MinIO initialized successfully';
      exit 0
      "
volumes:
  pgdata:
  minio-data:
